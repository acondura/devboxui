name = "devboxui"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = ""  # Set KV_ID env var at deploy time via pages-build script

# ─── Cron Triggers ────────────────────────────────────────────────────────────
# These run hourly (every hour at :00). The route handler checks the configured
# local time per server and skips if it's not the right hour.
#
# Morning: runs every hour — the /api/schedule/morning handler fires only when
#          the server's configured spin-up time matches the current local hour.
# Evening: same pattern for /api/schedule/evening.
#
# To customise: change cron expressions. UTC times below.
# Default windows cover 04:00–12:00 UTC (morning) and 12:00–21:00 UTC (evening)
# to accommodate any timezone from UTC-8 to UTC+12.

# ─── Secrets (set via wrangler secret put or Cloudflare Dashboard) ────────────
# CRON_SECRET          — shared secret to authenticate cron trigger calls
# HETZNER_API_TOKEN    — Hetzner Cloud project API token
# CLOUDFLARE_API_TOKEN — Cloudflare API token for tunnel management
# KV_ID                — KV namespace ID (injected by pages-build script)
